{% extends "layout.html" %}

{% block content %}
<section class="home-container">
    <h1 class="title">Edit Timeline Event</h1>
    <form method="POST" action="{{ url_for('edit_timeline_event', IDtimelineEvent=event.IDtimelineEvent) }}" class="post-form">
        <input type="text" name="title" value="{{ event.title }}" required>
        <textarea name="description" rows="8" required>{{ event.description }}</textarea>
        <input type="text" name="date" value="{{ event.date }}" required>
        <button type="submit" class="admin-btn">Save Changes</button>
    </form>
</section>
{% endblock %}
