{% extends "layout.html" %}

{% block content %}
<section class="home-container">
    <h1 class="title">Edit Post</h1>
    <form method="POST" action="{{ url_for('edit_post', IDpost=post.IDpost) }}" class="post-form">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" value="{{ post.title }}" required>

        <label for="content">Content</label>
        <textarea id="content" name="content" rows="8" required>{{ post.content }}</textarea>

        <label for="date">Date</label>
        <input type="text" id="date" name="date" value="{{ post.date }}" required>

        <div class="form-actions">
            <button type="submit" class="admin-btn">Save Changes</button>
        </div>
    </form>
</section>
{% endblock %}
