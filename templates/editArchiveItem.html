{% extends "layout.html" %}

{% block content %}
<section class="home-container">
    <h1 class="title">Edit Archive Item</h1>
    <form method="POST" action="{{ url_for('edit_archive_item', IDarchiveItem=item.IDarchiveItem) }}" class="post-form">
        <input type="number" name="year" value="{{ item.year }}" required>
        <input type="text" name="author" value="{{ item.author }}" required>
        <input type="text" name="name" value="{{ item.name }}" required>
        <input type="file" name="pdf_file" accept=".pdf">
        <button type="submit" class="admin-btn">Save Changes</button>
    </form>
</section>
{% endblock %}
