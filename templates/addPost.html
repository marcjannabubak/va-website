{% extends "layout.html" %}

{% block content %}
<section class="home-container">
    <h1 class="title">Add Post to {{ board.title }}</h1>
    <form method="POST" action="{{ url_for('add_post_page', IDboard=board.IDboard) }}" class="post-form">
        <input type="text" name="title" placeholder="Post title" required>
        <textarea name="content" placeholder="Post content" rows="8" required></textarea>
        <input type="text" name="date" placeholder="Date (e.g. 2026-04-17)" required>
        <button type="submit" class="admin-btn">Save Post</button>
    </form>
</section>
{% endblock %}
