{% extends "layout.html" %}

{% block content %}
<section class="home-container">
    <h1 class="title">Add Post to {{ board.title }}</h1>
    <form method="POST" action="{{ url_for('add_post_page', IDboard=board.IDboard) }}" class="post-form">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" placeholder="Post title" required>

        <label for="content">Content</label>
        <textarea id="content" name="content" placeholder="Post content" rows="8" required></textarea>

        <label for="date">Date</label>
        <input type="text" id="date" name="date" placeholder="e.g. 2026-04-17" required>

        <div class="form-actions">
            <button type="submit" class="admin-btn">Save Post</button>
        </div>
    </form>
</section>
{% endblock %}
