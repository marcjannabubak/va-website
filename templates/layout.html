<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Arts</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav>
        <a href="{{ url_for('home') }}" class="logo">Visual Arts</a>

        <div>
            {% if session.get('admin') %}
                <span class="nav-user">Logged in as {{ session.get('admin') }}</span>
                <a href="{{ url_for('logout') }}" class="nav-btn">Log Out</a>
            {% else %}
                <button id="openLogin" class="nav-btn" type="button">Log In</button>
            {% endif %}
        </div>
    </nav>

    <div id="loginOverlay" class="overlay">
        <div class="login-container">
            <button id="closeLogin" class="close-btn" type="button">&times;</button>

            <form method="POST" action="{{ url_for('login') }}">
                <h2>Admin Login</h2>

                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>

                <button type="submit">Log In</button>

                {% if error %}
                    <p class="message">{{ error }}</p>
                {% endif %}
            </form>
        </div>
    </div>

    {% block content %}{% endblock %}

    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
